# Use VPC DNS resolver for Cloud Map service discovery
resolver 172.31.0.2 valid=10s ipv6=off;

# ─── Bot classification via User-Agent ───────────────────────────────────────
#
# "blocked" — Commercial SEO/scraping bots. These crawl sites to build
#   backlink databases, keyword rankings, and competitor analysis tools.
#   They provide NO value: they don't index content for search, don't
#   answer user queries with our data, and don't send us traffic.
#
# "crawler" — Legitimate search engines and AI platforms that index our
#   content, surface it in search results, or use it to answer user queries.
#   We welcome them but rate-limit to protect our 0.25 vCPU Fargate tasks.
#
# ""  (default) — Regular browsers and unknown agents. Most generous limits.

map $http_user_agent $bot_class {
    default                  "";

    # Commercial SEO scrapers — blocked (403)
    ~*Bytespider             "blocked";   # TikTok's aggressive scraper
    ~*MJ12bot                "blocked";   # Majestic SEO — backlink database
    ~*AhrefsBot              "blocked";   # Ahrefs — SEO analytics tool
    ~*SemrushBot             "blocked";   # Semrush — SEO analytics tool
    ~*DotBot                 "blocked";   # Moz — SEO analytics tool
    ~*PetalBot               "blocked";   # Huawei — minimal search relevance
    ~*BLEXBot                "blocked";   # Webmeup — link analysis
    ~*MegaIndex              "blocked";   # MegaIndex — SEO tool
    ~*Sogou                  "blocked";   # Chinese SE — irrelevant for Hebrew content

    # Legitimate crawlers — rate-limited
    ~*GPTBot                 "crawler";
    ~*ClaudeBot              "crawler";
    ~*CCBot                  "crawler";
    ~*PerplexityBot          "crawler";
    ~*Amazonbot              "crawler";
    ~*Diffbot                "crawler";
    ~*Applebot               "crawler";
    ~*FacebookBot            "crawler";
    ~*anthropic              "crawler";
    ~*Baiduspider            "crawler";
    ~*YandexBot              "crawler";
    ~*TikTokSpider           "crawler";
}

# ─── Rate limit keys ─────────────────────────────────────────────────────────
# Per-IP key for crawlers only (empty string = zone not applied)
map $bot_class $crawler_limit_key {
    default         "";
    "crawler"       $remote_addr;
}

# Global key for all crawler traffic (shared across IPs).
# Needed because some crawlers (e.g. PerplexityBot) spread requests across
# multiple IPs to evade per-IP limits.
map $bot_class $crawler_global_key {
    default         "";
    "crawler"       "all_crawlers";
}

# ─── Rate limit zones (in shared memory) ─────────────────────────────────────
#
# Context: each Fargate task has 0.25 vCPU. Pages are SSR'd at ~300KB each.
# The March 15 2026 downtime was caused by GPTBot doing ~30 req/min from one
# IP — enough to saturate the event loop and fail health checks.
#
# Per-IP general:    60 req/min — generous for real users; no human browses
#                    faster than 1 page/sec sustained. Burst allows short
#                    navigation bursts (e.g. opening multiple tabs).
# Per-IP crawler:    10 req/min — ~1 req every 6s, still fast enough for
#                    indexing but won't saturate a 0.25 vCPU task.
# Global crawler:    30 req/min — caps total crawler load across all IPs,
#                    catches distributed crawling (e.g. PerplexityBot's 8 IPs).
limit_req_zone $remote_addr          zone=ip_general:10m    rate=60r/m;
limit_req_zone $crawler_limit_key    zone=ip_crawler:2m     rate=10r/m;
limit_req_zone $crawler_global_key   zone=global_crawler:1m rate=30r/m;

limit_req_status 429;
limit_req_log_level warn;

server {
    listen 80;
    server_name xn--febl3a.co.il תנך.co.il xn--febl3a.com תנך.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name xn--febl3a.co.il תנך.co.il;
    ssl_certificate     /etc/letsencrypt/live/xn--febl3a.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--febl3a.co.il/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
         if ($bot_class = "blocked") {
             return 403 "Forbidden";
         }

         limit_req zone=ip_general   burst=20 nodelay;
         limit_req zone=ip_crawler   burst=5  nodelay;
         limit_req zone=global_crawler burst=10 nodelay;

         set $website_backend "website.bible-on-site.local";
         proxy_pass http://$website_backend:3000$request_uri;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-Proto https;
         proxy_set_header X-Bot-Class $bot_class;
         proxy_ssl_server_name on;
         proxy_ssl_verify off;
    }

    # Serve static files from www directory
    location /www/ {
        alias /var/www/html/;
        autoindex on;
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl;
    server_name xn--febl3a.com תנך.com;
    ssl_certificate     /etc/letsencrypt/live/xn--febl3a.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--febl3a.com/privkey.pem;
