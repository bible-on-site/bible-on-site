# Use VPC DNS resolver for Cloud Map service discovery
resolver 172.31.0.2 valid=10s ipv6=off;

map_hash_bucket_size 256;

# ─── Bot classification via User-Agent ───────────────────────────────────────
#
# "blocked" — Parasitic SEO bots that scrape our content solely to build
#   backlink databases, keyword rankings, and competitor-analysis dashboards.
#   They never index content for search, never answer user queries with our
#   data, and never send us traffic or link back to us.
#
# "crawler" — Search engines, AI platforms, and social-media bots that index
#   our content, surface it in search results or AI answers, and may link
#   back to us. We *encourage* them to train on our data (more exposure) but
#   rate-limit to protect our 0.25 vCPU Fargate tasks.
#
# ""  (default) — Regular browsers and unknown agents. Most generous limits.

map $http_user_agent $bot_class {
    default                  "";

    # Parasitic SEO scrapers — blocked (403)
    # These bots build commercial SEO databases (backlinks, rankings) and
    # never drive traffic, link back, or surface content to end users.
    ~*Bytespider             "blocked";   # TikTok's aggressive scraper
    ~*MJ12bot                "blocked";   # Majestic SEO — backlink database
    ~*AhrefsBot              "blocked";   # Ahrefs — SEO analytics tool
    ~*SemrushBot             "blocked";   # Semrush — SEO analytics tool
    ~*DotBot                 "blocked";   # Moz — SEO analytics tool
    ~*PetalBot               "blocked";   # Huawei — minimal search relevance
    ~*BLEXBot                "blocked";   # Webmeup — link analysis
    ~*MegaIndex              "blocked";   # MegaIndex — SEO tool
    ~*Sogou                  "blocked";   # Chinese SE — irrelevant for Hebrew content
    ~*DataForSeoBot          "blocked";   # DataForSEO — commercial SEO data provider

    # Legitimate crawlers — rate-limited
    # Search engines, AI training bots, and social bots. We welcome them:
    # AI models trained on our data may surface our content and link to us.
    ~*GPTBot                 "crawler";
    ~*ClaudeBot              "crawler";
    ~*CCBot                  "crawler";
    ~*PerplexityBot          "crawler";
    ~*Amazonbot              "crawler";
    ~*Diffbot                "crawler";
    ~*Applebot               "crawler";
    ~*FacebookBot            "crawler";
    ~*anthropic              "crawler";
    ~*Baiduspider            "crawler";
    ~*YandexBot              "crawler";
    ~*TikTokSpider           "crawler";
    ~*meta-externalagent     "crawler";   # Meta AI training (LLaMA). Uses 60+ IPs
                                          # from 57.141.20.0/24 at ~170 req/min.
                                          # Caused March 17 2026 downtime. Separate
                                          # from FacebookBot (link previews).
    ~*Googlebot              "crawler";
    ~*bingbot                "crawler";
}

# ─── Suspicious referer detection ────────────────────────────────────────────
# Block requests where Referer is the sitemap — real browsers never have
# sitemap.xml as their referer. This pattern was used by a distributed botnet
# (450+ IPs, Chrome/124 UA, ~300 req/min) that caused the March 16 2026 downtime.
map $http_referer $is_sitemap_scraper {
    default                                 0;
    ~*sitemap                               1;
}

# ─── Distributed botnet detection ───────────────────────────────────────────
# The same botnet (450+ IPs per wave) caused three outages:
#   March 16 — sitemap referer, Chrome/124 UA, ~300 req/min
#   March 17 AM — meta-externalagent from 57.141.20.0/24 (separate actor)
#   March 17 PM — Chrome/124 UA, no referer, ~70 req/min sustained
# Chrome/124.0.0.0 was released mid-2024 and is nearly a year obsolete.
# No legitimate user runs this exact version. Safe to block.
map $http_user_agent $is_botnet_ua {
    default                                 0;
    "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" 1;
}

# ─── Rate limit keys ─────────────────────────────────────────────────────────
# Per-IP key for crawlers only (empty string = zone not applied)
map $bot_class $crawler_limit_key {
    default         "";
    "crawler"       $remote_addr;
}

# Global key for all crawler traffic (shared across IPs).
# Needed because some crawlers (e.g. PerplexityBot) spread requests across
# multiple IPs to evade per-IP limits.
map $bot_class $crawler_global_key {
    default         "";
    "crawler"       "all_crawlers";
}

# ─── Rate limit zones (in shared memory) ─────────────────────────────────────
#
# Context: each Fargate task has 0.25 vCPU. Pages are SSR'd at ~300KB each.
# The March 15 2026 downtime was caused by GPTBot doing ~30 req/min from one
# IP — enough to saturate the event loop and fail health checks.
#
# No per-IP general limit: a single Next.js page load triggers 20-30
# concurrent RSC/prefetch requests from the browser. Any per-IP limit
# low enough to stop bots would also block real users.
#
# Per-IP crawler:    10 req/min — ~1 req every 6s, still fast enough for
#                    indexing but won't saturate a 0.25 vCPU task.
# Global crawler:    30 req/min — caps total crawler load across all IPs,
#                    catches distributed crawling (e.g. PerplexityBot's 8 IPs).
#
# Global backend:    Hard ceiling on total requests reaching the backend.
#                    With 0.25 vCPU tasks, each can handle ~20 concurrent SSR
#                    requests before the event loop saturates. Set high enough
#                    for ~10 concurrent real users (each generating 20-30 RSC
#                    requests per page load) plus legitimate crawlers, but low
#                    enough to stop a 300+ req/min distributed attack.
limit_req_zone $crawler_limit_key    zone=ip_crawler:2m     rate=10r/m;
limit_req_zone $crawler_global_key   zone=global_crawler:1m rate=30r/m;
limit_req_zone "1"                   zone=global_backend:1m rate=300r/m;

# Limit concurrent connections to the backend per server block.
# Prevents connection exhaustion from slow-loris or high-volume attacks.
limit_conn_zone $server_name zone=backend_conn:1m;

limit_req_status 429;
limit_req_log_level warn;

server {
    listen 80;
    server_name xn--febl3a.co.il תנך.co.il xn--febl3a.com תנך.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name xn--febl3a.co.il תנך.co.il;
    ssl_certificate     /etc/letsencrypt/live/xn--febl3a.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--febl3a.co.il/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
         if ($bot_class = "blocked") {
             return 403 "Forbidden";
         }

         if ($is_sitemap_scraper) {
             return 403 "Forbidden";
         }

         if ($is_botnet_ua) {
             return 403 "Forbidden";
         }

         limit_req zone=ip_crawler     burst=5  nodelay;
         limit_req zone=global_crawler  burst=10 nodelay;
         limit_req zone=global_backend  burst=150 nodelay;
         limit_conn backend_conn 80;

         set $website_backend "website.bible-on-site.local";
         proxy_pass http://$website_backend:3000$request_uri;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-Proto https;
         proxy_set_header X-Bot-Class $bot_class;
         proxy_ssl_server_name on;
         proxy_ssl_verify off;
    }

    # Serve static files from www directory
    location /www/ {
        alias /var/www/html/;
        autoindex on;
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl;
    server_name xn--febl3a.com תנך.com;
    ssl_certificate     /etc/letsencrypt/live/xn--febl3a.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--febl3a.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
         if ($bot_class = "blocked") {
             return 403 "Forbidden";
         }

         if ($is_sitemap_scraper) {
             return 403 "Forbidden";
         }

         if ($is_botnet_ua) {
             return 403 "Forbidden";
         }

         limit_req zone=ip_crawler     burst=5  nodelay;
         limit_req zone=global_crawler  burst=10 nodelay;
         limit_req zone=global_backend  burst=150 nodelay;
         limit_conn backend_conn 80;

         set $website_backend "website.bible-on-site.local";
         proxy_pass http://$website_backend:3000$request_uri;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-Proto https;
         proxy_set_header X-Bot-Class $bot_class;
         proxy_ssl_server_name on;
         proxy_ssl_verify off;
    }

    # Serve static files from www directory
    location /www/ {
        alias /var/www/html/;
        autoindex on;
        try_files $uri $uri/ =404;
    }
}


