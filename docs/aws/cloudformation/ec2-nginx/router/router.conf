             return 403 "Forbidden";
         }

         limit_req zone=ip_crawler     burst=5  nodelay;
         limit_req zone=global_crawler  burst=10 nodelay;
         # limit_req zone=global_backend  burst=150 nodelay;
         # limit_conn backend_conn 80;

         set $website_backend "website.bible-on-site.local";
         proxy_pass http://$website_backend:3000$request_uri;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-Proto https;
         proxy_set_header X-Bot-Class $bot_class;
         proxy_ssl_server_name on;
         proxy_ssl_verify off;
    }

    # Serve static files from www directory
    location /www/ {
        alias /var/www/html/;
        autoindex on;
        try_files $uri $uri/ =404;
    }
}


