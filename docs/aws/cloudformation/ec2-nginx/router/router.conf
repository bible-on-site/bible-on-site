# Use VPC DNS resolver for Cloud Map service discovery
resolver 172.31.0.2 valid=10s ipv6=off;

# ─── Bot classification via User-Agent ───────────────────────────────────────
# Maps UA to a bot class: "blocked", "crawler", or "" (regular traffic)

map $http_user_agent $bot_class {
    default                  "";
    ~*Bytespider             "blocked";
    ~*MJ12bot                "blocked";
    ~*AhrefsBot              "blocked";
    ~*SemrushBot             "blocked";
    ~*DotBot                 "blocked";
    ~*PetalBot               "blocked";
    ~*BLEXBot                "blocked";
    ~*MegaIndex              "blocked";
    ~*Sogou                  "blocked";
    ~*GPTBot                 "crawler";
    ~*ClaudeBot              "crawler";
    ~*CCBot                  "crawler";
    ~*PerplexityBot          "crawler";
    ~*Amazonbot              "crawler";
    ~*Diffbot                "crawler";
    ~*Applebot               "crawler";
    ~*FacebookBot            "crawler";
    ~*anthropic              "crawler";
    ~*Baiduspider            "crawler";
    ~*YandexBot              "crawler";
    ~*TikTokSpider           "crawler";
}

# ─── Rate limit keys ─────────────────────────────────────────────────────────
# Per-IP key for crawlers only (empty string = no limit applied)
map $bot_class $crawler_limit_key {
    default         "";
    "crawler"       $remote_addr;
}

# Global key for all crawler traffic (shared across IPs)
map $bot_class $crawler_global_key {
    default         "";
    "crawler"       "all_crawlers";
}

# ─── Rate limit zones (in shared memory) ─────────────────────────────────────
# Per-IP general:    15 req/min per IP (all traffic)
# Per-IP crawler:     5 req/min per crawler IP
# Global crawler:    20 req/min across all crawler IPs combined
limit_req_zone $remote_addr          zone=ip_general:10m    rate=15r/m;
limit_req_zone $crawler_limit_key    zone=ip_crawler:2m     rate=5r/m;
limit_req_zone $crawler_global_key   zone=global_crawler:1m rate=20r/m;

limit_req_status 429;
limit_req_log_level warn;

server {
    listen 80;
    server_name xn--febl3a.co.il תנך.co.il xn--febl3a.com תנך.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name xn--febl3a.co.il תנך.co.il;
    ssl_certificate     /etc/letsencrypt/live/xn--febl3a.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--febl3a.co.il/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
         if ($bot_class = "blocked") {
             return 403 "Forbidden";
         }

         limit_req zone=ip_general   burst=10 nodelay;
         limit_req zone=ip_crawler   burst=3  nodelay;
         limit_req zone=global_crawler burst=5 nodelay;

         set $website_backend "website.bible-on-site.local";
         proxy_pass http://$website_backend:3000$request_uri;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-Proto https;
         proxy_ssl_server_name on;
         proxy_ssl_verify off;
    }

    # Serve static files from www directory
    location /www/ {
        alias /var/www/html/;
        autoindex on;
        try_files $uri $uri/ =404;
    }
}

server {
    listen 443 ssl;
    server_name xn--febl3a.com תנך.com;
    ssl_certificate     /etc/letsencrypt/live/xn--febl3a.com/fullchain.pem;
