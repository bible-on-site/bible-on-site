[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

[config]
default_to_workspace = false

# =============================================================================
# Common Tasks
# =============================================================================

[tasks.build]
description = "Build all data processing tools"
command = "cargo"
args = ["build", "--release"]

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

[tasks.lint]
description = "Run clippy linter"
command = "cargo"
args = ["clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.fmt]
description = "Format code"
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-check]
description = "Check code formatting"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

# =============================================================================
# Sefaria Setup Tasks
# =============================================================================

[tasks.sefaria-setup]
description = "Check MongoDB installation and setup environment"
cwd = "./sefaria/setup-and-population"
command = "cargo"
args = ["run", "--release", "--", "setup"]

[tasks.sefaria-populate]
description = "Populate MongoDB with Sefaria dump"
cwd = "./sefaria/setup-and-population"
command = "cargo"
args = ["run", "--release", "--", "populate"]

# =============================================================================
# Pipeline Tasks
# =============================================================================

[tasks.generate-tanah-view]
description = "Generate tanah view from MongoDB (use --json or --sqlite)"
cwd = "./sefaria/pipelines/tanah-view"
script = '''
echo "Usage: cargo make generate-tanah-view-json OR cargo make generate-tanah-view-sqlite"
'''

[tasks.generate-tanah-view-json]
description = "Generate tanah view as JSON"
cwd = "./sefaria/pipelines/tanah-view"
command = "cargo"
args = ["run", "--release", "--", "--format", "json"]

[tasks.generate-tanah-view-sqlite]
description = "Generate tanah view as SQLite"
cwd = "./sefaria/pipelines/tanah-view"
command = "cargo"
args = [
    "run",
    "--release",
    "--",
    "--format",
    "sqlite",
    "--output-to-dependant-modules",
]

[tasks.generate-compass-stages]
description = "Generate MongoDB Compass stages for debugging tanah-view aggregation pipeline"
cwd = "./sefaria/pipelines/tanah-view"
command = "cargo"
args = ["run", "--release", "--", "--format", "compass-stages"]

# =============================================================================
# Perusim Pipeline Tasks
# =============================================================================

[tasks.generate-perushim-view-json]
description = "Generate perushim catalog as JSON (parshanim + perushim for web)"
cwd = "./sefaria/pipelines/perushim-view"
command = "cargo"
args = ["run", "--release", "--", "--format", "json"]

[tasks.generate-perushim-view-sqlite]
description = "Generate perushim SQLite: catalog (bundled) + notes (PAD/on-demand)"
cwd = "./sefaria/pipelines/perushim-view"
command = "cargo"
args = [
    "run",
    "--release",
    "--",
    "--format",
    "sqlite",
    "--output-to-dependant-modules",
]

[tasks.generate-perushim-view-mysql]
description = "Generate perushim notes as MySQL SQL file"
cwd = "./sefaria/pipelines/perushim-view"
command = "cargo"
args = [
    "run",
    "--release",
    "--",
    "--format",
    "mysql",
    "--output-to-dependant-modules",
]

[tasks.generate-perushim-view-all]
description = "Generate perushim in all formats (JSON, SQLite, MySQL) for web/app/DB; requires MongoDB"
dependencies = [
    "generate-perushim-view-json",
    "generate-perushim-view-sqlite",
    "generate-perushim-view-mysql",
]

[tasks.generate-perushim-compass-stages]
description = "Generate MongoDB Compass stages for debugging perushim aggregation pipeline"
cwd = "./sefaria/pipelines/perushim-view"
command = "cargo"
args = ["run", "--release", "--", "--format", "compass-stages"]

[tasks.generate-tanah-view-mysql]
description = "Generate tanah view as MySQL SQL file"
cwd = "./sefaria/pipelines/tanah-view"
command = "cargo"
args = [
    "run",
    "--release",
    "--",
    "--format",
    "mysql",
    "--output-to-dependant-modules",
]

# =============================================================================
# S3 Tasks
# =============================================================================

[tasks.s3-populate]
description = "Populate S3 bucket with test data (uses S3_* env vars)"
cwd = "./s3/s3-populator"
command = "cargo"
args = ["run", "--release"]

[tasks.s3-populate-dev]
description = "Populate S3 bucket with dev environment"
cwd = "./s3/s3-populator"
env = { "S3_ENDPOINT" = "http://localhost:4566", "S3_ACCESS_KEY_ID" = "test", "S3_SECRET_ACCESS_KEY" = "test_1234", "S3_BUCKET" = "bible-on-site-assets-dev" }
command = "cargo"
args = ["run", "--release"]

[tasks.s3-populate-test]
description = "Populate S3 bucket with test environment"
cwd = "./s3/s3-populator"
env = { "S3_ENDPOINT" = "http://localhost:4566", "S3_ACCESS_KEY_ID" = "test", "S3_SECRET_ACCESS_KEY" = "test_1234", "S3_BUCKET" = "bible-on-site-assets-test" }
command = "cargo"
args = ["run", "--release"]

[tasks.s3-clear]
description = "Clear S3 bucket (uses S3_* env vars)"
cwd = "./s3/s3-populator"
command = "cargo"
args = ["run", "--release", "--", "--clear-only"]

# =============================================================================
# MySQL Tasks
# =============================================================================

[tasks.mysql-populate]
description = "Populate MySQL database with Tanah structure and test data"
cwd = "./mysql/db-populator"
command = "cargo"
args = ["run", "--release"]

[tasks.mysql-populate-dev]
description = "Populate MySQL dev database (tanah-dev)"
env_files = [".dev.env"]
cwd = "./mysql/db-populator"
command = "cargo"
args = ["run", "--release"]

[tasks.mysql-populate-test]
description = "Populate MySQL test database (tanah_test)"
env_files = [".test.env"]
cwd = "./mysql/db-populator"
command = "cargo"
args = ["run", "--release"]

[tasks.mysql-drop]
description = "Drop the MySQL test database (for clean state testing)"
cwd = "./mysql/db-populator"
command = "cargo"
args = ["run", "--release", "--", "--drop-only"]

[tasks.mysql-populate-data-only]
description = "Populate MySQL database with test data only (skip structure)"
cwd = "./mysql/db-populator"
command = "cargo"
args = ["run", "--release", "--", "--skip-structure"]

[tasks.dev]
description = "Dev target: populate dev DB"
dependencies = ["mysql-populate-dev"]

[tasks.test]
description = "Test target: populate test DB"
dependencies = ["mysql-populate-test"]

# =============================================================================
# Unit Test Tasks
# =============================================================================

[tasks.test-unit-dir-create]
description = "Create JUnit report output directory"
command = "mkdir"
args = ["-p", ".junit-report/unit"]

[tasks.test-unit]
description = "Run all unit tests"
command = "cargo"
args = ["test", "--workspace"]

[tasks.test-unit-junit]
description = "Run all unit tests with JUnit output"
dependencies = ["test-unit-dir-create"]
command = "cargo"
args = ["nextest", "run", "--workspace", "--profile", "ci"]

# =============================================================================
# Integration Test Tasks
# =============================================================================

[tasks.test-integration-dir-create]
description = "Create integration test JUnit report output directory"
command = "mkdir"
args = ["-p", ".junit-report/integration"]

[tasks.test-integration]
description = "Run integration tests (requires MongoDB with Sefaria dump)"
command = "cargo"
args = ["test", "--workspace", "--features", "integration"]

[tasks.test-integration-junit]
description = "Run integration tests with JUnit output"
dependencies = ["test-integration-dir-create"]
command = "cargo"
args = [
    "nextest",
    "run",
    "--workspace",
    "--features",
    "integration",
    "--profile",
    "ci-integration",
]

# =============================================================================
# Coverage Tasks
# =============================================================================

[tasks.coverage-unit-dir-create]
description = "Create unit coverage output directory"
command = "mkdir"
args = ["-p", ".coverage/unit"]

[tasks.coverage-unit-lcov]
description = "Run unit tests with coverage and generate lcov.info"
dependencies = ["coverage-unit-dir-create"]
command = "cargo"
args = [
    "llvm-cov",
    "test",
    "--workspace",
    "--lcov",
    "--output-path",
    ".coverage/unit/lcov.info",
]

[tasks.coverage-unit-junit]
description = "Run unit tests with JUnit output for CI reporting"
dependencies = ["test-unit-dir-create"]
command = "cargo"
args = ["nextest", "run", "--workspace", "--profile", "ci"]

# TODO: run unit tests only once and report both lcov and junit
[tasks.coverage-unit]
description = "Run unit tests with both coverage (lcov) and JUnit output"
dependencies = ["coverage-unit-lcov", "coverage-unit-junit"]

[tasks.coverage-integration-dir-create]
description = "Create integration coverage output directory"
command = "mkdir"
args = ["-p", ".coverage/integration"]

[tasks.coverage-integration-lcov]
description = "Run integration tests with coverage and generate lcov.info"
dependencies = ["coverage-integration-dir-create"]
command = "cargo"
args = [
    "llvm-cov",
    "test",
    "--workspace",
    "--features",
    "integration",
    "--lcov",
    "--output-path",
    ".coverage/integration/lcov.info",
]

[tasks.coverage-integration-junit]
description = "Run integration tests with JUnit output for CI reporting"
dependencies = ["test-integration-dir-create"]
command = "cargo"
args = [
    "nextest",
    "run",
    "--workspace",
    "--features",
    "integration",
    "--profile",
    "ci-integration",
]

# TODO: run integration tests only once and report both lcov and junit
[tasks.coverage-integration]
description = "Run integration tests with both coverage (lcov) and JUnit output"
dependencies = ["coverage-integration-lcov", "coverage-integration-junit"]

[tasks.coverage-merged-dir-create]
description = "Create merged coverage output directory"
command = "mkdir"
args = ["-p", ".coverage/merged"]

[tasks.coverage-merge]
description = "Merge unit and integration coverage reports into a single lcov.info"
dependencies = ["coverage-merged-dir-create"]
command = "docker"
args = [
    "run",
    "--rm",
    "-t",
    "-v",
    "${CARGO_MAKE_WORKING_DIRECTORY}/.coverage:/.coverage",
    "lcov-cli:0.0.2",
    "--rc",
    "branch_coverage=1",
    "-a",
    "/.coverage/unit/lcov.info",
    "-a",
    "/.coverage/integration/lcov.info",
    "-o",
    "/.coverage/merged/lcov.info",
]

[tasks.coverage-all]
description = "Run all tests with coverage and merge reports"
dependencies = ["coverage-unit", "coverage-integration", "coverage-merge"]

[tasks.coverage-unit-browser]
description = "Run unit tests with coverage and open HTML report in browser"
condition = { env_not_set = ["CI"] }
command = "cargo"
args = ["llvm-cov", "test", "--workspace", "--html", "--open"]
